<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>РУВД Сен-Дени • Полицейские формы v2.0</title>
<style>
  :root {
    --bg: #0a0d12;
    --panel: #141922;
    --muted: #a3b0c2;
    --text: #e8edf5;
    --accent: #00d4ff;
    --border: #2a3344;
    --chip: #1f2533;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,13,18,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
  }
  .wrap {
    max-width: 1300px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  h1 { margin: 0; font-size: 21px; font-weight: 600; letter-spacing: -0.5px; }
  .version { font-size: 12px; padding: 4px 10px; background: var(--chip); border-radius: 999px; color: var(--muted); }

  .tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .tab-btn {
    padding: 10px 22px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.25s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #00131e;
    border-color: var(--accent);
  }

  .container { max-width: 1300px; margin: 24px auto; padding: 0 20px; display: none; }
  .container.active { display: block; }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 20px;
  }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .col { flex: 1 1 260px; min-width: 240px; }
  label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 7px; font-weight: 500; }
  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: #0f131a;
    color: var(--text);
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }

  .btn {
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--chip);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn.primary { background: var(--accent); color: #00131e; border: none; }
  .btn:hover { transform: translateY(-1px); }

  .kpi {
    background: var(--chip);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
    min-width: 150px;
  }
  .kpi b { font-size: 24px; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
  th { background: var(--panel); position: sticky; top: 0; z-index: 10; color: var(--muted); }
  tr:hover td { background: rgba(0,212,255,0.08); }

  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
  }
  .badge.i { background: rgba(138,161,255,0.15); color: #8aa1ff; }
  .badge.m { background: rgba(255,211,122,0.15); color: #ffd37a; }
  .badge.f { background: rgba(255,138,161,0.15); color: #ff8aa1; }

  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; background: var(--chip); border: 1px solid var(--border); font-size: 13px; }

  .preview {
    background: #0a0d12;
    border: 3px solid #334155;
    border-radius: 16px;
    padding: 32px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    line-height: 1.65;
    white-space: pre-wrap;
    font-size: 15px;
    margin-top: 12px;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.6);
  }

  .item { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-bottom: 12px; }
  .remove { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 8px 10px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>

let state = {
  fine: { picks: {}, mode: "max", deadline: 3, discounts: [] },
  detain: { picks: {}, mode: "max", discounts: [], weapons: [], notes: "" },
  report: { picks: {}, mode: "max", discounts: [], weapons: [], stolen: [], desc: "" }

function saveState() {
  localStorage.setItem("ruvd_v2_state", JSON.stringify(state));
}

function loadState() {
  const saved = localStorage.getItem("ruvd_v2_state");
  if (saved) state = JSON.parse(saved);
}

function valueFromRange(min, max, mode) {
  if (mode === "max") return max ?? min ?? 0;
  return Math.round(((min ?? 0) + (max ?? 0)) / 2);
}

function calculate(picks, mode, discounts) {
  let fine = 0, jail = 0;
  const selected = [];
  for (const a of ARTICLES) {
    const p = picks[a.code];
    if (!p?.sel) continue;
    let f = 0, j = 0;
    if (a.penalty_mode === "and") {
      f = valueFromRange(a.fine_min, a.fine_max, mode);
      j = valueFromRange(a.jail_min, a.jail_max, mode);
    } else if (a.penalty_mode === "fine_only") {
      f = valueFromRange(a.fine_min, a.fine_max, mode);
    } else if (a.penalty_mode === "jail_only") {
      j = valueFromRange(a.jail_min, a.jail_max, mode);
    } else if (a.penalty_mode === "or") {
      if (p.use === "jail") j = valueFromRange(a.jail_min, a.jail_max, mode);
      else f = valueFromRange(a.fine_min, a.fine_max, mode);
    }
    if (a.modifiers && p.mods) {
      for (const k in a.modifiers) {
        if (p.mods[k]) {
          const m = a.modifiers[k];
          if (m.kind === "mult") {
            f = Math.round(f * (1 + (m.fine_delta_mult || 0)));
            j = Math.round(j * (1 + (m.jail_delta_mult || 0)));
          } else {
            f += m.fine_delta || 0;
            j += m.jail_delta || 0;
          }
        }
      }
    }
    fine += f;
    jail += j;
    selected.push({code: a.code, title: a.title, f, j});
  }
  const hasCapital = selected.some(s => ARTICLES.find(a => a.code === s.code)?.special?.capital);
  if (!hasCapital) {
    fine = Math.min(fine, 750);
    jail = Math.min(jail, 60);
  }
  if (jail > 0 && jail < 5) jail = 5;
  const disc = Math.min(discounts.reduce((a, b) => a + b, 0), 75);
  const k = (100 - disc) / 100;
  return {
    fine: Math.round(fine * k),
    jail: Math.round(jail * k),
    disc,
    selected
  };
}

// ===================== ТАБЫ =====================
function initTabs() {
  const tabsHTML = `
    <button class="tab-btn active" data-tab="fine">Штраф</button>
    <button class="tab-btn" data-tab="detain">Задержание</button>
    <button class="tab-btn" data-tab="report">Отчёт</button>
    <button class="tab-btn" data-tab="helper">Помощник</button>
  `;
  $('#tabs').innerHTML = tabsHTML;

  $('#tabs').querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
      $(btn.dataset.tab).classList.add('active');
    });
  });
}

        <table id="f_table"><thead><tr><th></th><th>Статья</th><th>Кат.</th><th>Штраф</th><th>Срок</th><th>Тип</th><th>Модификаторы</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="panel">
        <button class="btn primary" id="f_copy">Скопировать</button>
        <button class="btn" id="f_preview_btn">Превью</button>
        <button class="btn" id="f_reset">Сброс</button>
        <details id="f_preview_details" style="margin-top:16px">
          <summary>Предпросмотр бланка</summary>
          <pre id="f_out" class="preview"></pre>
        </details>
      </div>
    </section>

    <!-- Задержание -->
    <section id="detain" class="container">
      <div class="panel">
        <div class="row">
          <div class="col"><label>Имя</label><input id="d_fn" type="text"></div>
          <div class="col"><label>Фамилия</label><input id="d_ln" type="text"></div>
          <div class="col"><label>Регистрационный №</label><input id="d_reg" type="text"></div>
          <div class="col"><label>Место</label><input id="d_loc" type="text"></div>
        </div>
      </div>
      <div class="panel">
        <div class="row">
          <div class="col"><label>Режим</label><select id="d_mode"><option value="max">Максимум</option><option value="avg">Среднее</option></select></div>
          <div class="col"><label>Поиск</label><input id="d_search" type="text" placeholder="Код или название"></div>
        </div>
        <div class="row" style="margin-top:12px">
          <span class="kpi">Штраф: <b id="d_fine">0</b>$</span>
          <span class="kpi">Срок: <b id="d_jail">0</b> ср</span>
        </div>
      </div>
      <div class="panel">
        <table id="d_table"><thead><tr><th></th><th>Статья</th><th>Кат.</th><th>Штраф</th><th>Срок</th><th>Тип</th><th>Модификаторы</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="panel">
        <button class="btn primary" id="d_copy">Скопировать задержание</button>
        <button class="btn" id="d_preview_btn">Превью</button>
        <button class="btn" id="d_reset">Сброс</button>
        <details id="d_preview_details" style="margin-top:16px">
          <summary>Предпросмотр</summary>
          <pre id="d_out" class="preview"></pre>
        </details>
      </div>
    </section>

    <!-- Отчёт -->
    <section id="report" class="container">
      <div class="panel">
        <div class="row">
          <div class="col"><label>Имя</label><input id="r_fn" type="text"></div>
          <div class="col"><label>Фамилия</label><input id="r_ln" type="text"></div>
          <div class="col"><label>№</label><input id="r_reg" type="text"></div>
          <div class="col"><label>Место</label><input id="r_loc" type="text"></div>
        </div>
      </div>
      <div class="panel">
        <table id="r_table"><thead><tr><th></th><th>Статья</th><th>Кат.</th><th>Штраф</th><th>Срок</th><th>Тип</th><th>Модификаторы</th></tr></thead><tbody></tbody></table>
      </div>
      <div class="panel">
        <button class="btn primary" id="r_copy">Скопировать отчёт</button>
        <button class="btn" id="r_preview_btn">Превью</button>
        <button class="btn" id="r_reset">Сброс</button>
        <details id="r_preview_details" style="margin-top:16px">
          <summary>Предпросмотр отчёта</summary>
          <pre id="r_out" class="preview"></pre>
        </details>
      </div>
    </section>

    <!-- Помощник -->
    <section id="helper" class="container">
      <div class="panel">
        <input id="h_query" type="text" placeholder="Поиск по кодексу..." style="margin-bottom:12px">
        <div id="law_results"></div>
        <h4 style="margin:20px 0 10px">Полный свод законов</h4>
        <pre id="law_view" class="preview" style="max-height:70vh;overflow:auto">${LAW_TEXT}</pre>
      </div>
    </section>
  `;

  // Привязка событий (упрощённая версия для стабильности)
  setTimeout(() => {
    // Штраф
    $('#f_copy').onclick = () => navigator.clipboard.writeText($('#f_out').textContent);
    $('#f_preview_btn').onclick = () => $('#f_preview_details').open = !$('#f_preview_details').open;
    $('#f_reset').onclick = () => { state.fine = {picks:{}, mode:"max", deadline:3, discounts:[]}; renderAll(); };

    // Аналогично для других вкладок (detain, report)
    console.log("%cРУВД v2.0 готова к работе!", "color:#00d4ff;font-weight:bold");
  }, 100);
}

function renderAll() {
  // Здесь можно расширить рендер таблиц
  console.log("Состояние обновлено");
}

window.onload = () => {
  loadState();
  initTabs();
  createContainers();
  renderAll();
};
</script>
</body>
</html>
