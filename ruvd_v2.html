<style>

    align-items: center;

    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 10px 22px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    border-radius: 12px;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.25s;
  }
  .tab-btn.active {
    background: var(--accent);
    color: #00131e;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.25);
  }

  .panel {

    color: var(--muted);
    font-size: 13px;
    margin-bottom: 7px;
    font-weight: 500;
  }

    background: #0f131a;
    color: var(--text);
    font-size: 15px;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .btn {
    padding: 12px 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--chip);
    color: var(--text);
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
  }
  .btn.primary {
    background: var(--accent);
    color: #00131e;
    border: none;
  }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,212,255,0.2); }

  .kpi {
    background: var(--chip);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    text-align: center;
    min-width: 150px;
  }
  .kpi b { font-size: 24px; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; }
  th, td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    vertical-align: top;
  }
  th {
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 10;
    color: var(--muted);
    font-weight: 500;
  }
  tr:hover td { background: rgba(0,212,255,0.07); }

  .badge {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
  }
  .badge.i { background: rgba(138,161,255,0.15); color: #8aa1ff; }
  .badge.m { background: rgba(255,211,122,0.15); color: #ffd37a; }
  .badge.f { background: rgba(255,138,161,0.15); color: #ff8aa1; }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 999px;
    background: var(--chip);
    border: 1px solid var(--border);
    font-size: 13px;
  }

  .preview {
    background: #0a0d12;
    border: 3px solid #334155;
    border-radius: 16px;
    padding: 32px;
    font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
    line-height: 1.65;
    white-space: pre-wrap;
    font-size: 15.2px;

  }
  .preview-header {

    margin-bottom: 20px;
  }
  .preview-header h2 {
    margin: 0;
    font-size: 19px;
    color: var(--accent);
  }

  .history-item {
    padding: 12px 16px;
    border-radius: 12px;
    background: var(--chip);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .history-item:hover {
    background: var(--accent);
    color: #00131e;
  }

  @media (max-width: 1100px) {
    .row { gap: 12px; }
    .col { flex: 1 1 100%; }
  }
</style>
</head>

// ===================== УТИЛИТЫ =====================
const $ = id => document.getElementById(id);

let currentState = {
  fine: { picks: {}, mode: "max", deadline: 3, discounts: [] },
  detain: { picks: {}, mode: "max", discounts: [], weapons: [], notes: "", hasNotes: false },
  report: { picks: {}, mode: "max", discounts: [], weapons: [], stolen: [], desc: "" }
};

const history = JSON.parse(localStorage.getItem('ruvd_history') || '[]');

// ===================== РАСЧЁТ НАКАЗАНИЯ =====================
function valueFromRange(min, max, mode) {
  if (mode === "max") return max ?? min ?? 0;
  if (min == null) return Math.floor((max || 0) / 2);
  if (max == null) return Math.floor(min / 2);
  return Math.round((min + max) / 2);
}

function calculate(picks, mode, discounts) {
  let fine = 0, jail = 0;
  const selected = [];

  for (const a of ARTICLES) {
    const p = picks[a.code];
    if (!p?.sel) continue;

    let f = 0, j = 0;
    if (a.penalty_mode === "and") {
      f = valueFromRange(a.fine_min, a.fine_max, mode);
      j = valueFromRange(a.jail_min, a.jail_max, mode);
    } else if (a.penalty_mode === "fine_only") {
      f = valueFromRange(a.fine_min, a.fine_max, mode);
    } else if (a.penalty_mode === "jail_only") {
      j = valueFromRange(a.jail_min, a.jail_max, mode);
    } else if (a.penalty_mode === "or") {
      if (p.use === "jail") j = valueFromRange(a.jail_min, a.jail_max, mode);
      else f = valueFromRange(a.fine_min, a.fine_max, mode);
    }

    // модификаторы
    if (a.modifiers && p.mods) {
      for (const k in a.modifiers) {
        if (p.mods[k]) {
          const m = a.modifiers[k];
          if (m.kind === "mult") {
            f = Math.round(f * (1 + (m.fine_delta_mult || 0)));
            j = Math.round(j * (1 + (m.jail_delta_mult || 0)));
          } else {
            f += m.fine_delta || 0;
            j += m.jail_delta || 0;
          }
        }
      }
    }

    fine += f;
    jail += j;
    selected.push({code: a.code, title: a.title, fine: f, jail: j, a});
  }

  const hasCapital = selected.some(s => s.a.special?.capital);
  if (!hasCapital) {
    fine = Math.min(fine, 750);
    jail = Math.min(jail, 60);
  }
  if (jail > 0 && jail < 5) jail = 5;

  const disc = Math.min(discounts.reduce((a,b)=>a+b,0), 75);
  const k = (100 - disc) / 100;
  fine = Math.round(fine * k);
  jail = Math.round(jail * k);

  return {fine, jail, disc, selected};
}

function renderTabs() {
  const tabsContainer = $('#tabs');
  tabsContainer.innerHTML = `
    <button class="tab-btn active" data-tab="fine">Штраф</button>
    <button class="tab-btn" data-tab="detain">Задержание</button>
    <button class="tab-btn" data-tab="report">Отчёт</button>
    <button class="tab-btn" data-tab="helper">Кодекс</button>
  `;

  tabsContainer.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
      $('#' + btn.dataset.tab).classList.add('active');
    });
  });
}
