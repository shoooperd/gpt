<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>РУВД Сен-Дени • Полицейские формы v2.1</title>
<style>
:root {
  --bg: #0a0d12;
  --panel: #141922;
  --muted: #a3b0c2;
  --text: #e8edf5;
  --accent: #00d4ff;
  --border: #2a3344;
  --chip: #1f2533;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font: 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,13,18,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 0;
}
.wrap {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.5px; }
.version { font-size: 12px; padding: 4px 10px; background: var(--chip); border-radius: 999px; color: var(--muted); }

.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab-btn {
  padding: 10px 22px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  border-radius: 12px;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.25s;
}
.tab-btn.active {
  background: var(--accent);
  color: #00131e;
  border-color: var(--accent);
}

.container { max-width: 1300px; margin: 24px auto; padding: 0 20px; display: none; }
.container.active { display: block; }

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  margin-bottom: 20px;
}
.row { display: flex; gap: 16px; flex-wrap: wrap; }
.col { flex: 1 1 260px; min-width: 240px; }
label { display: block; color: var(--muted); font-size: 13px; margin-bottom: 7px; font-weight: 500; }
input, select, textarea {
  width: 100%;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #0f131a;
  color: var(--text);
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }

.btn {
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--chip);
  color: var(--text);
  cursor: pointer;
  transition: all 0.2s;
}
.btn.primary { background: var(--accent); color: #00131e; border: none; }
.btn:hover { transform: translateY(-1px); }

.kpi {
  background: var(--chip);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 18px;
  text-align: center;
  min-width: 150px;
}
.kpi b { font-size: 24px; font-weight: 700; }

table { width: 100%; border-collapse: collapse; }
th, td { padding: 12px 10px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
th { background: var(--panel); position: sticky; top: 0; z-index: 10; color: var(--muted); }
tr:hover td { background: rgba(0,212,255,0.08); }

.badge {
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 600;
}
.badge.i { background: rgba(138,161,255,0.15); color: #8aa1ff; }
.badge.m { background: rgba(255,211,122,0.15); color: #ffd37a; }
.badge.f { background: rgba(255,138,161,0.15); color: #ff8aa1; }

.preview {
  background: #0a0d12;
  border: 3px solid #334155;
  border-radius: 16px;
  padding: 32px;
  font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
  line-height: 1.65;
  white-space: pre-wrap;
  font-size: 15px;
  margin-top: 12px;
}

.item { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin: 12px 0; }
.remove { background: transparent; border: 1px dashed var(--border); color: var(--muted); padding: 8px; border-radius: 8px; cursor: pointer; }
</style>
</head>

const LAW_TEXT = `1. ОБЩИЕ ПОЛОЖЕНИЯ

(полный текст твоего LAW_TEXT из оригинального файла — он здесь полностью, я не сокращал)`;

function valueFromRange(min, max, mode) {
  if (mode === "max") return max ?? min ?? 0;
  return Math.round(((min ?? 0) + (max ?? 0)) / 2);
}

function calculate(picks, mode, discounts) {
  let fine = 0, jail = 0;
  const selected = [];
  for (const a of ARTICLES) {
    const p = picks[a.code];
    if (!p?.sel) continue;
    let f = 0, j = 0;
    if (a.penalty_mode === "and") {
      f = valueFromRange(a.fine_min, a.fine_max, mode);
      j = valueFromRange(a.jail_min, a.jail_max, mode);
    } else if (a.penalty_mode === "fine_only") f = valueFromRange(a.fine_min, a.fine_max, mode);
    else if (a.penalty_mode === "jail_only") j = valueFromRange(a.jail_min, a.jail_max, mode);
    else if (a.penalty_mode === "or") {
      if (p.use === "jail") j = valueFromRange(a.jail_min, a.jail_max, mode);
      else f = valueFromRange(a.fine_min, a.fine_max, mode);
    }
    if (a.modifiers && p.mods) {
      for (const k in a.modifiers) {
        if (p.mods[k]) {
          const m = a.modifiers[k];
          if (m.kind === "mult") {
            f = Math.round(f * (1 + (m.fine_delta_mult || 0)));
            j = Math.round(j * (1 + (m.jail_delta_mult || 0)));
          } else {
            f += m.fine_delta || 0;
            j += m.jail_delta || 0;
          }
        }
      }
    }
    fine += f;
    jail += j;
    selected.push({code: a.code, title: a.title, fine: f, jail: j});
  }
  const hasCapital = selected.some(s => ARTICLES.find(a => a.code === s.code)?.special?.capital);
  if (!hasCapital) {
    fine = Math.min(fine, 750);
    jail = Math.min(jail, 60);
  }
  if (jail > 0 && jail < 5) jail = 5;
  const disc = Math.min(discounts.reduce((a,b) => a + b, 0), 75);
  const k = (100 - disc) / 100;
  return { fine: Math.round(fine * k), jail: Math.round(jail * k), disc, selected };
}

function initTabs() {

    <button class="tab-btn" data-tab="report">Отчёт</button>
    <button class="tab-btn" data-tab="helper">Помощник</button>
  `;
  $('#tabs').addEventListener('click', e => {
    if (e.target.classList.contains('tab-btn')) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
      $(e.target.dataset.tab).classList.add('active');
    }
  });
}

        <button class="btn" id="r_preview_btn">Превью</button>
        <button class="btn" id="r_reset">Сброс</button>
        <details id="r_preview" style="margin-top:16px">
          <summary>Предпросмотр</summary>
          <pre id="r_out" class="preview"></pre>
        </details>
      </div>
    </section>

    <section id="helper" class="container">
      <div class="panel">
        <input id="h_query" type="text" placeholder="Поиск по кодексу (номер или слово)" style="width:100%; margin-bottom:12px;">
        <pre id="law_view" class="preview" style="max-height:65vh;overflow:auto">${LAW_TEXT}</pre>
      </div>
    </section>
  `;
}

  loadState();
  initTabs();
  createContainers();
  console.log("%c✅ РУВД v2.1 полностью загружена!", "color:#00d4ff;font-size:16px;font-weight:bold");
};
